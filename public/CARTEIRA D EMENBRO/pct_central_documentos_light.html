  manifesto:`<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Movimento Cidadania e Trabalho</div><div class="hd-sub">Diretório Municipal de Taquara – RS</div></div><div style="font-size:10px;color:#888;text-align:right;">Versão 1.0 · Abril/2026<br>Código: PCT-INST-001</div></div><h1>Manifesto do Movimento</h1><p class="subtitle">PCT – Unir · Defender · Transformar</p><h2>Nossa Declaração</h2><p class="doc-body-text">O PCT – Movimento Cidadania e Trabalho nasce da convicção de que a política deve servir ao povo. Somos um movimento de cidadãos comprometidos com a transformação da realidade municipal, guiados pelos valores da ética, da participação democrática e do desenvolvimento social.</p><h2>Nossas Causas</h2><div class="info-box"><strong>1. Cidadania ativa:</strong> Todo cidadão tem o direito e o dever de participar das decisões que afetam sua comunidade.<br><strong>2. Trabalho digno:</strong> Defendemos políticas que gerem emprego, renda e desenvolvimento econômico local.<br><strong>3. Transparência:</strong> Exigimos gestão pública honesta, transparente e responsável.</div><h2>Nosso Compromisso</h2><p class="doc-body-text">Comprometemo-nos a atuar com integridade, ouvir a população, defender os direitos fundamentais e construir pontes entre cidadãos e poder público.</p><div class="sig-row"><div class="sig" style="margin-top:30px;"><div class="sig-name">Marcos V. Dresbach do Amaral</div><div class="sig-role">Presidente – PCT Taquara/RS</div></div></div>`,

  missao:`<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Movimento Cidadania e Trabalho</div><div class="hd-sub">Missão, Visão e Valores Institucionais</div></div><div style="font-size:10px;color:#888;text-align:right;">Versão 1.0 · Abril/2026<br>Código: PCT-INST-002</div></div><h1>Missão, Visão e Valores</h1><h2>Missão</h2><p class="doc-body-text">Promover a cidadania ativa, incentivar a participação social e política, desenvolver ações educacionais e comunitárias, fomentando a formação de lideranças comprometidas com princípios éticos, democráticos e sociais.</p><h2>Visão</h2><p class="doc-body-text">Ser referência em formação política e cidadã no município de Taquara e região, consolidando-se como um movimento plural, ético e transformador da realidade local.</p><h2>Valores</h2><table><tr><th>Valor</th><th>Descrição</th></tr><tr><td><strong>Legalidade</strong></td><td>Atuação dentro dos marcos legais e constitucionais</td></tr><tr><td><strong>Moralidade</strong></td><td>Conduta ética e íntegra em todas as ações</td></tr><tr><td><strong>Transparência</strong></td><td>Prestação de contas e acesso público às informações</td></tr><tr><td><strong>Participação</strong></td><td>Democracia interna e escuta ativa dos membros</td></tr><tr><td><strong>Dignidade</strong></td><td>Respeito incondicional à pessoa humana</td></tr></table>`,

  carta_principios:`<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Movimento Cidadania e Trabalho</div><div class="hd-sub">Carta de Princípios</div></div><div style="font-size:10px;color:#888;text-align:right;">Versão 1.0 · Abril/2026<br>Código: PCT-INST-003</div></div><h1>Carta de Princípios</h1><p class="doc-body-text">O PCT fundamenta sua atuação nos seguintes princípios inegociáveis:</p><div class="info-box"><strong>Art. 1º — Democracia:</strong> O PCT defende a democracia plena como único sistema legítimo de organização política.<br><br><strong>Art. 2º — Igualdade:</strong> Todos os cidadãos são iguais em direitos e deveres, sem distinção de raça, gênero, religião ou origem.<br><br><strong>Art. 3º — Participação:</strong> A participação popular é condição essencial para a legitimidade de qualquer decisão política.<br><br><strong>Art. 4º — Responsabilidade:</strong> Todo dirigente responde por seus atos perante os membros e a sociedade.</div><div class="sig-row"><div class="sig" style="margin-top:30px;"><div class="sig-name">Marcos V. Dresbach do Amaral</div><div class="sig-role">Presidente</div></div><div class="sig" style="margin-top:30px;"><div class="sig-name">[Secretário(a) Geral]</div><div class="sig-role">Secretário(a) Geral</div></div></div>`,

  regimento:`<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Movimento Cidadania e Trabalho</div><div class="hd-sub">Regimento Interno</div></div><div style="font-size:10px;color:#888;text-align:right;">Versão 1.0 · Abril/2026<br>Código: PCT-ADM-001</div></div><h1>Regimento Interno</h1><h2>Capítulo I – Disposições Gerais</h2><p class="doc-body-text art"><strong>Art. 1º</strong> – O presente Regimento Interno disciplina o funcionamento operacional do PCT, complementando o Estatuto Social.</p><p class="doc-body-text art"><strong>Art. 2º</strong> – As reuniões da Diretoria Executiva realizar-se-ão quinzenalmente, em data e local definidos pelo Presidente.</p><h2>Capítulo II – Das Reuniões</h2><p class="doc-body-text art"><strong>Art. 3º</strong> – O quórum mínimo para deliberações é de maioria simples (50%+1) dos membros da Diretoria.</p><p class="doc-body-text art"><strong>Art. 4º</strong> – As decisões serão registradas em ata, assinada por todos os presentes.</p><h2>Capítulo III – Das Responsabilidades</h2><p class="doc-body-text art"><strong>Art. 5º</strong> – Cada dirigente é responsável pelas ações de sua área, devendo prestar contas mensalmente.</p>`,

  ata_fundacao_pct:`<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Movimento Cidadania e Trabalho</div><div class="hd-sub">Ata de Fundação – Documento Original</div></div><div style="font-size:10px;color:#888;text-align:right;">Código: PCT-JUR-001<br>Taquara/RS · 2026</div></div><h1>Ata de Fundação do PCT</h1><p class="doc-body-text">Aos _____ dias do mês de ____________ de 2026, na cidade de Taquara, Estado do Rio Grande do Sul, reuniram-se os cidadãos abaixo identificados, com o objetivo de constituir o <strong>PCT – Movimento Cidadania e Trabalho</strong>, associação civil de direito privado, sem fins lucrativos, nos termos do Código Civil Brasileiro.</p><h2>Deliberações da Assembleia de Fundação</h2><p class="doc-body-text art"><strong>1.</strong> Aprovação da denominação: PCT – Movimento Cidadania e Trabalho.</p><p class="doc-body-text art"><strong>2.</strong> Aprovação do Estatuto Social.</p><p class="doc-body-text art"><strong>3.</strong> Eleição da primeira Diretoria Executiva.</p><p class="doc-body-text art"><strong>4.</strong> Fixação da sede no município de Taquara/RS.</p><h2>Diretoria Eleita</h2><table><tr><th>Cargo</th><th>Nome</th><th>CPF</th></tr><tr><td>Presidente</td><td>Marcos V. Dresbach do Amaral</td><td>___.___.___-__</td></tr><tr><td>Vice-Presidente</td><td></td><td></td></tr><tr><td>Secretário(a) Geral</td><td></td><td></td></tr><tr><td>Diretor(a) Financeiro(a)</td><td></td><td></td></tr></table>`,

  estatuto:`<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Movimento Cidadania e Trabalho</div><div class="hd-sub">Estatuto Social – Versão Oficial</div></div><div style="font-size:10px;color:#888;text-align:right;">Código: PCT-JUR-002<br>Aprovado: Abril/2026</div></div><h1>Estatuto Social</h1><p class="subtitle">PCT – Unir · Defender · Transformar · Sede: Taquara/RS</p><h2>Capítulo I – Da Denominação e Finalidade</h2><p class="doc-body-text art"><strong>Art. 1º</strong> – O PCT é uma associação civil de direito privado, sem fins lucrativos, com sede em Taquara/RS, constituída por prazo indeterminado.</p><p class="doc-body-text art"><strong>Art. 2º</strong> – Tem por finalidade promover a cidadania, incentivar a participação social e política e desenvolver ações educacionais e comunitárias.</p><p class="doc-body-text art"><strong>Art. 4º</strong> – O PCT não possui fins lucrativos, sendo vedada a distribuição de lucros a seus membros.</p><p class="doc-body-text art"><strong>Art. 5º</strong> – O PCT não possui natureza de partido político, atuando como organização da sociedade civil.</p><h2>Capítulo II – Dos Princípios</h2><p class="doc-body-text art"><strong>Art. 6º</strong> – O PCT orienta suas atividades pelos princípios da legalidade, moralidade, transparência, ética e responsabilidade social.</p><h2>Capítulo III – Dos Membros</h2><p class="doc-body-text art"><strong>Art. 8º</strong> – Poderão integrar o PCT todas as pessoas físicas maiores de 16 anos.</p><p class="doc-body-text art"><strong>Art. 9º</strong> – A admissão de novos membros será realizada mediante cadastro formal e aprovação da Diretoria Executiva.</p><p class="doc-body-text art"><strong>Art. 10º</strong> – Os membros têm direito de participar das atividades, votar e ser votados.</p>`,

  termo_filiacao:`<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Jurídico · Compliance</div><div class="hd-sub">Termo de Filiação</div></div><div style="font-size:10px;color:#888;text-align:right;">Código: PCT-JUR-COMP-001</div></div><h1>Termo de Filiação</h1><div class="field-row"><div class="field"><label>Nome</label><span>______________________________</span></div><div class="field"><label>CPF</label><span>___.___.___-__</span></div></div><div class="field-row"><div class="field"><label>Data de Nascimento</label><span>___/___/____</span></div><div class="field"><label>Naturalidade</label><span>________________</span></div></div><h2>Declaração</h2><div class="info-box">Eu, identificado(a) acima, declaro meu desejo de filiar-me ao PCT – Movimento Cidadania e Trabalho, afirmando que:<br><br>1. Li e aceito integralmente o Estatuto Social do PCT;<br>2. Comprometo-me a cumprir as decisões da Assembleia Geral e da Diretoria Executiva;<br>3. Atuarei com ética e respeito aos princípios do Movimento;<br>4. Estou ciente de que meus dados serão tratados conforme a LGPD.</div><div class="sig-row"><div class="sig" style="margin-top:30px;"><div class="sig-name">[Filiado(a)]</div><div class="sig-role">Assinatura</div></div><div class="sig" style="margin-top:30px;"><div class="sig-name">Marcos V. Dresbach do Amaral</div><div class="sig-role">Presidente</div></div></div>`,

  comunicado:`<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Movimento Cidadania e Trabalho</div><div class="hd-sub">Comunicado Oficial</div></div><div style="font-size:10px;color:#888;text-align:right;">Nº ___/2026<br>Taquara, ___/___/2026</div></div><h1>Comunicado Oficial</h1><h2>Assunto</h2><p class="doc-body-text"><strong>Ref.:</strong> _____________________________________________</p><h2>Comunicamos</h2><p class="doc-body-text">O PCT – Movimento Cidadania e Trabalho comunica a todos os membros, filiados e parceiros que ______________________________________________________________________________________________________________________________________.</p><p class="doc-body-text">Informações adicionais poderão ser obtidas junto à Secretaria do Diretório.</p><div class="sig-row"><div class="sig" style="margin-top:30px;"><div class="sig-name">Marcos V. Dresbach do Amaral</div><div class="sig-role">Presidente – PCT Taquara/RS</div></div></div>`,

  nota_publica:`<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Movimento Cidadania e Trabalho</div><div class="hd-sub">Nota Pública</div></div><div style="font-size:10px;color:#888;text-align:right;">Taquara, ___/___/2026</div></div><h1>Nota Pública</h1><p class="doc-body-text">O PCT – Movimento Cidadania e Trabalho, por meio de sua Diretoria Executiva, vem a público manifestar sua posição sobre _______________________________________________.</p><p class="doc-body-text">_____________________________________________________________________________________________________________________________.</p><p class="doc-body-text">O PCT reafirma seu compromisso com a democracia, a transparência e os interesses da população de Taquara e região.</p><div class="sig-row"><div class="sig" style="margin-top:30px;"><div class="sig-name">Diretoria Executiva – PCT</div><div class="sig-role">Diretório Municipal de Taquara/RS</div></div></div>`,
};

function getTpl(tpl,name){
  if(TEMPLATES[tpl]) return TEMPLATES[tpl];
  return `<div class="brasil-bar"></div><div class="header-doc"><div><div class="hd-org">PCT – Movimento Cidadania e Trabalho</div><div class="hd-sub">${name}</div></div><div style="font-size:10px;color:#888;text-align:right;">Versão 1.0 · Abril/2026</div></div><h1>${name}</h1><p class="subtitle">PCT – Diretório Municipal de Taquara/RS</p><h2>Identificação</h2><div class="field-row"><div class="field"><label>Responsável</label><span>______________________________</span></div><div class="field"><label>Data</label><span>___/___/2026</span></div><div class="field"><label>Versão</label><span>1.0</span></div></div><div class="field-row"><div class="field"><label>Status</label><span>Rascunho / Revisão / Aprovado</span></div><div class="field"><label>Vínculo</label><span>Taquara – RS</span></div></div><h2>Conteúdo</h2><p class="doc-body-text">_______________________________________________________________________________________________________________</p><p class="doc-body-text">_______________________________________________________________________________________________________________</p><h2>Histórico de Alterações</h2><table><tr><th>Versão</th><th>Data</th><th>Alteração</th><th>Responsável</th></tr><tr><td>1.0</td><td>___/2026</td><td>Criação do documento</td><td>_____________</td></tr></table><div class="sig-row"><div class="sig" style="margin-top:30px;"><div class="sig-name">______________________</div><div class="sig-role">Responsável</div></div><div class="sig" style="margin-top:30px;"><div class="sig-name">Marcos V. Dresbach do Amaral</div><div class="sig-role">Presidente</div></div></div>`;
}

let curPortal=0, curDocName='';

function renderSidebar(){
  document.getElementById('sidebar-btns').innerHTML=`
    <div class="sb-label">Portais</div>`+
    PORTALS.map((p,i)=>`<button class="portal-btn${i===curPortal?' active':''}" onclick="selPortal(${i})">
      <div class="pb-dot" style="background:${p.dot}"></div>
      <span class="pb-name">${p.name}</span>
      <span class="pb-count">${p.cats.reduce((a,c)=>a+c.docs.length,0)}</span>
    </button>`).join('');
}

function renderStats(){
  const tot=PORTALS.reduce((a,p)=>a+p.cats.reduce((b,c)=>b+c.docs.length,0),0);
  const apv=PORTALS.reduce((a,p)=>a+p.cats.reduce((b,c)=>b+c.docs.filter(d=>d.status==='Aprovado').length,0),0);
  const rev=PORTALS.reduce((a,p)=>a+p.cats.reduce((b,c)=>b+c.docs.filter(d=>d.status==='Revisão').length,0),0);
  const rsc=PORTALS.reduce((a,p)=>a+p.cats.reduce((b,c)=>b+c.docs.filter(d=>d.status==='Rascunho').length,0),0);
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-num">${tot}</div><div class="stat-lbl">Total de documentos</div><div class="stat-sub">7 portais ativos</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#1a7a30">${apv}</div><div class="stat-lbl">Aprovados</div><div class="stat-sub">prontos para uso</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#854F0B">${rev}</div><div class="stat-lbl">Em revisão</div><div class="stat-sub">aguardando aprovação</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#bbb">${rsc}</div><div class="stat-lbl">Rascunho</div><div class="stat-sub">em elaboração</div></div>`;
  document.getElementById('total-count').textContent=`${tot} documentos · 7 portais`;
}

function renderPortal(idx){
  const p=PORTALS[idx];
  let h=`<div class="portal-header" style="background:${p.badgeColor};border-color:${p.color}30;">
    <div><div class="ph-title">${p.name}</div><div class="ph-desc">${p.desc}</div></div>
    <div class="ph-badge" style="background:${p.badgeColor};color:${p.badgeText};border:1px solid ${p.color}40;">${p.badge}</div>
  </div>`;
  p.cats.forEach(cat=>{
    h+=`<div class="cat-section"><div class="cat-label">${cat.name}</div><div class="doc-grid">`;
    cat.docs.forEach(doc=>{
      const sc=SC[doc.status];
      h+=`<div class="doc-card">
        <div class="dc-top">
          <div class="dc-icon" style="background:${p.badgeColor};color:${p.dot}">${ICON}</div>
          <div class="dc-status" style="background:${sc.bg};color:${sc.color}">${doc.status}</div>
        </div>
        <div class="dc-name">${doc.name}</div>
        <div class="dc-type">${doc.type}</div>
        <div class="dc-actions">
          <button class="btn-view" onclick="openDoc('${doc.tpl}','${doc.name}','${p.color}','${p.name}')">Visualizar</button>
          <button class="btn-print" onclick="openDoc('${doc.tpl}','${doc.name}','${p.color}','${p.name}',true)">Imprimir</button>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById('portal-content').innerHTML=h;
}

function selPortal(idx){curPortal=idx;renderSidebar();renderPortal(idx);}

function openDoc(tpl,name,color,portal,print=false){
  curDocName=name;
  document.getElementById('modal-topbar').style.background=color;
  document.getElementById('modal-title').textContent=name+' · '+portal;
  document.getElementById('modal-body').innerHTML=getTpl(tpl,name);
  document.getElementById('modal-bg').classList.add('open');
  if(print) setTimeout(printDoc,300);
}

function closeModal(){document.getElementById('modal-bg').classList.remove('open');}

function printDoc(){
  const content=document.getElementById('modal-body').innerHTML;
  const w=window.open('','_blank','width=820,height=950');
  w.document.write(`<!DOCTYPE html><html><head><title>${curDocName} – PCT</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Barlow',sans-serif;font-size:12px;color:#111;padding:32px 40px;line-height:1.6;background:#fff;}
  h1{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#1B4FA8;text-align:center;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
  h2{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:#1B4FA8;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;border-bottom:1.5px solid #E8A800;padding-bottom:3px;}
  .brasil-bar{height:5px;background:linear-gradient(90deg,#1B4FA8 33%,#228B2F 33%,#228B2F 66%,#E8A800 66%);margin-bottom:14px;border-radius:2px;}
  .header-doc{display:flex;justify-content:space-between;border-bottom:2px solid #1B4FA8;padding-bottom:10px;margin-bottom:14px;}
  .hd-org{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#1B4FA8;text-transform:uppercase;}
  .hd-sub{font-size:9px;color:#666;}
  .subtitle{text-align:center;font-size:11px;color:#666;margin-bottom:16px;}
  .doc-body-text{text-align:justify;color:#222;margin-bottom:8px;}
  .field-row{display:flex;gap:12px;margin-bottom:6px;}
  .field{flex:1;border-bottom:1px solid #ccc;padding-bottom:2px;}
  .field label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#1B4FA8;margin-bottom:2px;}
  .field span{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#111;}
  .sig-row{display:flex;gap:20px;margin-top:20px;}
  .sig{flex:1;border-top:1.5px solid #333;padding-top:4px;text-align:center;}
  .sig-name{font-size:11px;font-weight:700;color:#1B4FA8;}
  .sig-role{font-size:9px;color:#666;}
  .art strong{color:#1B4FA8;}
  .info-box{background:#f0f4ff;border:1px solid #b0c0e8;border-radius:4px;padding:8px 12px;margin:8px 0;font-size:11px;color:#222;}
  .info-box strong{color:#1B4FA8;}
  table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px;}
  table th{background:#1B4FA8;color:#fff;padding:5px 8px;text-align:left;font-size:10px;}
  table td{padding:5px 8px;border-bottom:0.5px solid #ddd;color:#222;}
  table tr:nth-child(even) td{background:#f8f9ff;}
  .footer-print{margin-top:28px;border-top:1px solid #E8A800;padding-top:8px;display:flex;justify-content:space-between;font-size:9px;color:#888;}
  @media print{body{padding:20px 24px;}@page{margin:1cm;}}</style></head>
  <body>${content}<div class="footer-print"><span>PCT – Movimento Cidadania e Trabalho · Diretório Municipal de Taquara/RS</span><span>Emitido em ${new Date().toLocaleDateString('pt-BR')} · UNIR · DEFENDER · TRANSFORMAR</span></div>
  <script>window.onload=function(){window.print();}<\/script></body></html>`);
  w.document.close();
}

renderSidebar();renderStats();renderPortal(0);
</script>
