# =============================================================
# Configuração Nginx PCT - Produção + Dev
# =============================================================

# Redirecionamento HTTP -> HTTPS e WWW -> Non-WWW (Principal)
server {
    listen 80;
    server_name pct.social.br www.pct.social.br;
    return 301 https://pct.social.br$request_uri;
}

# Bloco Principal (Portal Público + API)
server {
    listen 443 ssl http2;
    server_name pct.social.br;

    root /var/www/pct/public;
    index index.php index.html;

    # SSL (Certbot preencherá aqui)
    # ssl_certificate /etc/letsencrypt/live/pct.social.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pct.social.br/privkey.pem;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # Bloqueio de arquivos sensíveis
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    client_max_body_size 20M;
}

# =============================================================
# SUBDOMÍNIOS COM REDIRECIONAMENTO DE RAIZ
# =============================================================

# Administrativo
server {
    listen 80;
    server_name administrativo.pct.social.br;
    return 301 https://administrativo.pct.social.br$request_uri;
}
server {
    listen 443 ssl http2;
    server_name administrativo.pct.social.br;
    root /var/www/pct/public;
    index index.php;

    location = / { return 302 /admin/dashboard; }
    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }
}

