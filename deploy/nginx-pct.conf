server {
    listen 80;
    server_name pct.hotdogdovini.com.br;

    # Redireciona HTTP → HTTPS (Certbot ativa depois)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pct.hotdogdovini.com.br;

    root /var/www/pct/public;
    index index.php;

    # SSL — Certbot preenche automaticamente
    # ssl_certificate /etc/letsencrypt/live/pct.hotdogdovini.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pct.hotdogdovini.com.br/privkey.pem;

    # Logs (mesmo padrão do Vini)
    access_log /var/log/nginx/pct_access.log;
    error_log  /var/log/nginx/pct_error.log;

    # Assets buildados pelo Vite (cache longo)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Roteamento Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # Bloqueia arquivos sensíveis
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    client_max_body_size 10M;
}
